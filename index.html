<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的漫画库</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>我的漫画库</h1>
    </header>

    <main id="main-content">
        <!-- 漫画列表将通过JavaScript动态加载 -->
        <div id="comic-list-container">
            <h2>漫画列表</h2>
            <div id="comic-list"></div>
        </div>

        <!-- 漫画阅读器区域 (初始隐藏) -->
        <div id="reader-container" style="display: none;">
            <div id="reader-header">
                <button id="back-to-list">← 返回列表</button>
                <span id="current-comic-title"></span>
                <span id="page-counter">第 <span id="current-page">1</span> 页 / 共 <span id="total-pages">0</span> 页</span>
            </div>
            <div id="comic-display-area">
                <img id="current-page-image" src="" alt="漫画页面">
            </div>
            <div id="reader-controls">
                <button id="prev-page-btn">上一页</button>
                <button id="next-page-btn">下一页</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
