<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的漫画库</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>我的漫画库</h1>
    </header>

    <main id="main-content">
        <div id="comic-list-container">
            <h2>漫画列表</h2>
            <div id="comic-list"></div>
        </div>

        <div id="reader-container" style="display: none;">
            <div id="reader-header">
                <button id="back-to-list">← 返回列表</button>
                <span id="current-comic-title"></span>
                <!-- ✅ 已移除 display: none; 让页码计数器显示 -->
                <span id="page-counter">第 <span id="current-page">1</span> 页 / 共 <span id="total-pages">0</span> 页</span>
            </div>
            <!-- 新增：用于显示所有页面的容器 -->
            <div id="all-pages-container" style="display: none;"></div>
            <!-- 原有的单页显示区域 -->
            <div id="comic-display-area" style="display: none;">
                <img id="current-page-image" src="" alt="漫画页面">
            </div>
            <!-- 翻页控件 -->
            <div id="reader-controls" style="display: none;">
                <button id="prev-page-btn">上一页</button>
                <button id="next-page-btn">下一页</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
