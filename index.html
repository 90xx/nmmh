<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的漫画库</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>我的漫画库</h1>
    </header>

    <main id="main-content">
        <!-- 漫画列表页（主界面） -->
        <div id="comic-list-container">
            <h2>漫画列表</h2>
            <div id="comic-list"></div>
        </div>

        <!-- 漫画详情页（显示所有图片） -->
        <div id="comic-detail-container" style="display: none;">
            <div id="detail-header">
                <button id="back-to-list">← 返回列表</button>
                <h2 id="comic-title">乌兰斯</h2>
            </div>
            <!-- 新增：用于显示所有图片的容器 -->
            <div id="comic-pages"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
